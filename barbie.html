<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barbie-on-Steroids | The Gain-Frame</title>
  <meta name="description" content="Welcome to The Gain-Frame! Meet Fit-Barbie and unlock the legendary Portal of Content.">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #ff1493 0%, #ff69b4 50%, #ffb6d9 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .container {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Animation Canvas */
    canvas {
      display: block;
      max-width: 100%;
      height: auto;
    }

    /* UI Overlay */
    .ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* Narrator Text */
    .narrator {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
    }

    .narrator.show {
      animation: narratorFadeIn 1s ease-out forwards;
    }

    @keyframes narratorFadeIn {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    .narrator-text {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(12px, 2vw, 24px);
      color: #ffffff;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.8),
                    0 0 40px rgba(255, 105, 180, 1),
                    0 0 60px rgba(255, 20, 147, 0.6);
      line-height: 1.6;
      max-width: 90%;
      letter-spacing: 2px;
    }

    /* Skip Button */
    .skip-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      padding: 10px 20px;
      background: rgba(255, 105, 180, 0.7);
      color: white;
      border: 2px solid #ffffff;
      border-radius: 0;
      cursor: pointer;
      font-family: 'Press Start 2P', monospace;
      font-size: 12px;
      z-index: 200;
      transition: all 0.3s ease;
    }

    .skip-btn:hover {
      background: rgba(255, 20, 147, 1);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
    }

    /* Click to Start */
    .click-start {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      opacity: 1;
      transition: opacity 0.5s ease;
      z-index: 150;
    }

    .click-start.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .click-start-text {
      font-family: 'Press Start 2P', monospace;
      color: #ffffff;
      font-size: clamp(10px, 1.5vw, 16px);
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0.3; }
    }

    /* Particle System */
    .particle {
      position: absolute;
      pointer-events: none;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .narrator-text {
        font-size: 14px;
      }
      .skip-btn {
        font-size: 10px;
        padding: 8px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <canvas id="animationCanvas"></canvas>
    <div class="ui-overlay">
      <button class="skip-btn" onclick="skipToEnd()">SKIP</button>
      <div class="click-start" id="clickStart">
        <div class="click-start-text">CLICK TO START</div>
      </div>
      <div class="narrator" id="narratorBox">
        <div class="narrator-text" id="narratorText"></div>
      </div>
    </div>
  </div>

  <script>
    // ==================== CONFIGURATION ====================
    const FRAME_DURATION = 3000; // 3 seconds per frame
    const FRAMES = {
      1: { name: 'Idle State', duration: 3000 },
      2: { name: 'The Chug', duration: 2500 },
      3: { name: 'Power-Up', duration: 3000 },
      4: { name: 'Door Opening', duration: 2500 },
      5: { name: 'The Reveal', duration: 2500 },
      6: { name: 'Welcome', duration: 4000 }
    };

    const COLORS = {
      hotPink: '#ff1493',
      barbiePink: '#ff69b4',
      lightPink: '#ffb6d9',
      paleGold: '#ffd700',
      white: '#ffffff',
      darkPink: '#c71585'
    };

    // ==================== CANVAS SETUP ====================
    const canvas = document.getElementById('animationCanvas');
    const ctx = canvas.getContext('2d');
    
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // ==================== STATE MANAGEMENT ====================
    let animationState = {
      currentFrame: 1,
      frameStartTime: 0,
      isAnimating: false,
      hasStarted: false,
      particles: []
    };

    // ==================== PARTICLE SYSTEM ====================
    class Particle {
      constructor(x, y, type = 'sparkle') {
        this.x = x;
        this.y = y;
        this.type = type;
        this.vx = (Math.random() - 0.5) * 8;
        this.vy = (Math.random() - 0.5) * 8 - 2;
        this.life = 1;
        this.size = Math.random() * 3 + 2;
        this.rotation = Math.random() * Math.PI * 2;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.2; // gravity
        this.life -= 0.02;
        this.rotation += 0.1;
      }

      draw(ctx) {
        if (this.life <= 0) return;
        ctx.save();
        ctx.globalAlpha = this.life;
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);

        if (this.type === 'sparkle') {
          // Draw star
          drawStar(ctx, 0, 0, 5, this.size, this.size * 0.5);
          ctx.fillStyle = COLORS.paleGold;
          ctx.fill();
        } else if (this.type === 'lightning') {
          ctx.strokeStyle = COLORS.paleGold;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(0, -this.size);
          ctx.lineTo(Math.random() - 0.5, 0);
          ctx.lineTo(0, this.size);
          ctx.stroke();
        }

        ctx.restore();
      }
    }

    function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {
      let rot = Math.PI / 2 * 3;
      let step = Math.PI / spikes;

      ctx.beginPath();
      ctx.moveTo(cx, cy - outerRadius);
      for (let i = 0; i < spikes; i++) {
        ctx.lineTo(cx + Math.cos(rot) * outerRadius, cy + Math.sin(rot) * outerRadius);
        rot += step;
        ctx.lineTo(cx + Math.cos(rot) * innerRadius, cy + Math.sin(rot) * innerRadius);
        rot += step;
      }
      ctx.lineTo(cx, cy - outerRadius);
      ctx.closePath();
    }

    // ==================== DRAWING FUNCTIONS ====================

    function drawFrame1(ctx, progress) {
      // Background: Pink grid
      drawGridBackground(ctx, progress);

      // Barbie character
      const barbieCenterX = canvas.width / 2;
      const barbieCenterY = canvas.height / 2 - 50;

      // Draw Barbie's body (simplified silhouette)
      drawBarbie(ctx, barbieCenterX, barbieCenterY, 1, progress);

      // Protein Shaker
      drawShaker(ctx, barbieCenterX + 120, barbieCenterY + 80, 1, progress);

      // Text overlay
      ctx.font = 'bold 48px Arial';
      ctx.fillStyle = COLORS.white;
      ctx.textAlign = 'center';
      ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
      ctx.shadowBlur = 10;
      ctx.fillText('LOADING...', canvas.width / 2, 100);
    }

    function drawFrame2(ctx, progress) {
      // Background
      drawGridBackground(ctx, 1);

      const barbieCenterX = canvas.width / 2;
      const barbieCenterY = canvas.height / 2 - 50;

      // Drinking animation
      const drinkProgress = Math.min(progress, 1);
      drawBarbie(ctx, barbieCenterX, barbieCenterY, 1 - drinkProgress * 0.1, progress);
      drawShaker(ctx, barbieCenterX + 120 - drinkProgress * 20, barbieCenterY + 80 - drinkProgress * 40, 1 - drinkProgress * 0.15, drinkProgress);

      // Golden aura
      const auraIntensity = progress * 0.5;
      drawAura(ctx, barbieCenterX, barbieCenterY, 300, auraIntensity, COLORS.paleGold);
    }

    function drawFrame3(ctx, progress) {
      // Background grid peeling effect
      drawGridBackground(ctx, 1);

      const barbieCenterX = canvas.width / 2;
      const barbieCenterY = canvas.height / 2 - 50;

      // Most muscular pose
      drawBarbieMusclePose(ctx, barbieCenterX, barbieCenterY, progress);

      // Intense golden-pink aura
      const auraIntensity = 0.5 + progress * 0.5;
      drawAura(ctx, barbieCenterX, barbieCenterY, 400 + progress * 100, auraIntensity, COLORS.paleGold);

      // Sparkles and lightning
      if (progress > 0.3) {
        for (let i = 0; i < 5 + Math.floor(progress * 10); i++) {
          const angle = (Math.random() * Math.PI * 2);
          const distance = 200 + Math.random() * 200;
          const x = barbieCenterX + Math.cos(angle) * distance;
          const y = barbieCenterY + Math.sin(angle) * distance;

          // Sparkles
          ctx.fillStyle = COLORS.paleGold;
          ctx.globalAlpha = Math.random() * progress;
          drawStar(ctx, x, y, 5, 8, 4);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      // Update and draw particles
      animationState.particles.forEach((p, i) => {
        p.update();
        p.draw(ctx);
        if (p.life <= 0) animationState.particles.splice(i, 1);
      });

      // Generate new particles
      if (progress > 0.3 && Math.random() > 0.7) {
        const angle = Math.random() * Math.PI * 2;
        const distance = 250;
        animationState.particles.push(
          new Particle(
            barbieCenterX + Math.cos(angle) * distance,
            barbieCenterY + Math.sin(angle) * distance,
            Math.random() > 0.5 ? 'sparkle' : 'lightning'
          )
        );
      }
    }

    function drawFrame4(ctx, progress) {
      ctx.fillStyle = COLORS.barbiePink;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const barbieCenterX = canvas.width / 2 - 200;
      const barbieCenterY = canvas.height / 2;

      // Barbie on the side
      drawBarbieMusclePose(ctx, barbieCenterX, barbieCenterY, 1);

      // Door appears and opens
      const doorX = canvas.width / 2 + 100;
      const doorY = canvas.height / 2;
      const doorOpenProgress = progress;

      drawPearlDoor(ctx, doorX, doorY, doorOpenProgress);
    }

    function drawFrame5(ctx, progress) {
      // Bright background
      ctx.fillStyle = `rgba(255, 255, 255, ${0.3 + progress * 0.7})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Golden light rays
      drawLightRays(ctx, progress);

      // Portal/Cloud UI elements
      drawPortalClouds(ctx, progress);

      const barbieCenterX = canvas.width / 2 - 200;
      const barbieCenterY = canvas.height / 2;
      drawBarbieMusclePose(ctx, barbieCenterX, barbieCenterY, 1);
    }

    function drawFrame6(ctx, progress) {
      ctx.fillStyle = COLORS.barbiePink;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Heavenly light background
      const gradient = ctx.createRadialGradient(
        canvas.width / 2, canvas.height / 2, 100,
        canvas.width / 2, canvas.height / 2, Math.max(canvas.width, canvas.height)
      );
      gradient.addColorStop(0, 'rgba(255, 255, 255, 0.3)');
      gradient.addColorStop(1, 'rgba(255, 105, 180, 0)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Barbie welcoming with arms spread
      const barbieCenterX = canvas.width / 2;
      const barbieCenterY = canvas.height / 2;
      drawBarbieWelcome(ctx, barbieCenterX, barbieCenterY, progress);

      // Glow effect
      drawAura(ctx, barbieCenterX, barbieCenterY, 300, 0.5, COLORS.paleGold);
    }

    // ==================== BARBIE DRAWING FUNCTIONS ====================

    function drawBarbie(ctx, x, y, scale, progress) {
      ctx.save();
      ctx.scale(scale, scale);

      // Head
      ctx.fillStyle = '#FDBCB4';
      ctx.beginPath();
      ctx.arc(x / scale, (y - 120) / scale, 40, 0, Math.PI * 2);
      ctx.fill();

      // Blonde hair
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.arc(x / scale, (y - 130) / scale, 45, 0, Math.PI * 2);
      ctx.fill();

      // Face details
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc((x - 20) / scale, (y - 135) / scale, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc((x + 20) / scale, (y - 135) / scale, 5, 0, Math.PI * 2);
      ctx.fill();

      // Body with athletic dress
      ctx.fillStyle = '#ff1493';
      ctx.beginPath();
      ctx.ellipse(x / scale, y / scale, 35, 60, 0, 0, Math.PI * 2);
      ctx.fill();

      // Muscular arms
      ctx.fillStyle = '#FDBCB4';
      // Left arm
      ctx.beginPath();
      ctx.ellipse((x - 70) / scale, (y - 20) / scale, 20, 50, -0.3, 0, Math.PI * 2);
      ctx.fill();
      // Right arm
      ctx.beginPath();
      ctx.ellipse((x + 70) / scale, (y - 20) / scale, 20, 50, 0.3, 0, Math.PI * 2);
      ctx.fill();

      // Biceps definition
      ctx.strokeStyle = '#c71585';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc((x - 70) / scale, (y - 40) / scale, 15, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc((x + 70) / scale, (y - 40) / scale, 15, 0, Math.PI * 2);
      ctx.stroke();

      // Legs
      ctx.fillStyle = '#FDBCB4';
      ctx.fillRect((x - 20) / scale, (y + 60) / scale, 15, 50);
      ctx.fillRect((x + 5) / scale, (y + 60) / scale, 15, 50);

      ctx.restore();
    }

    function drawBarbieMusclePose(ctx, x, y, progress) {
      ctx.save();

      // Head
      ctx.fillStyle = '#FDBCB4';
      ctx.beginPath();
      ctx.arc(x, y - 120, 40, 0, Math.PI * 2);
      ctx.fill();

      // Blonde hair
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.arc(x, y - 130, 45, 0, Math.PI * 2);
      ctx.fill();

      // Fierce face
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(x - 20, y - 135, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x + 20, y - 135, 5, 0, Math.PI * 2);
      ctx.fill();

      // Body - most muscular pose
      ctx.fillStyle = '#ff1493';
      ctx.beginPath();
      ctx.ellipse(x, y, 40, 65, 0, 0, Math.PI * 2);
      ctx.fill();

      // Massive muscular arms - flexed biceps
      ctx.fillStyle = '#FDBCB4';
      // Left arm - flexed
      ctx.beginPath();
      ctx.ellipse(x - 90, y - 40, 30, 55, -0.4, 0, Math.PI * 2);
      ctx.fill();
      // Right arm - flexed
      ctx.beginPath();
      ctx.ellipse(x + 90, y - 40, 30, 55, 0.4, 0, Math.PI * 2);
      ctx.fill();

      // Huge biceps definition
      ctx.strokeStyle = COLORS.darkPink;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(x - 90, y - 60, 25, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(x + 90, y - 60, 25, 0, Math.PI * 2);
      ctx.stroke();

      // Defined abs
      ctx.fillStyle = COLORS.darkPink;
      ctx.fillRect(x - 15, y + 10, 10, 30);
      ctx.fillRect(x + 5, y + 10, 10, 30);

      // Legs in stance
      ctx.fillStyle = '#FDBCB4';
      ctx.fillRect(x - 25, y + 65, 18, 55);
      ctx.fillRect(x + 7, y + 65, 18, 55);

      ctx.restore();
    }

    function drawBarbieWelcome(ctx, x, y, progress) {
      ctx.save();

      // Head
      ctx.fillStyle = '#FDBCB4';
      ctx.beginPath();
      ctx.arc(x, y - 120, 40, 0, Math.PI * 2);
      ctx.fill();

      // Blonde hair
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.arc(x, y - 130, 45, 0, Math.PI * 2);
      ctx.fill();

      // Happy face
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(x - 20, y - 135, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x + 20, y - 135, 5, 0, Math.PI * 2);
      ctx.fill();
      // Smile
      ctx.strokeStyle = '#ff1493';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(x, y - 120, 15, 0, Math.PI, false);
      ctx.stroke();

      // Body
      ctx.fillStyle = '#ff1493';
      ctx.beginPath();
      ctx.ellipse(x, y, 40, 65, 0, 0, Math.PI * 2);
      ctx.fill();

      // Arms spread wide - welcoming pose
      const armSpread = Math.sin(progress * Math.PI) * 30;
      ctx.fillStyle = '#FDBCB4';
      // Left arm spread
      ctx.beginPath();
      ctx.ellipse(x - 110 - armSpread, y, 28, 50, -0.5, 0, Math.PI * 2);
      ctx.fill();
      // Right arm spread
      ctx.beginPath();
      ctx.ellipse(x + 110 + armSpread, y, 28, 50, 0.5, 0, Math.PI * 2);
      ctx.fill();

      // Muscular definition on arms
      ctx.strokeStyle = COLORS.darkPink;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(x - 110 - armSpread, y - 30, 20, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(x + 110 + armSpread, y - 30, 20, 0, Math.PI * 2);
      ctx.stroke();

      // Legs
      ctx.fillStyle = '#FDBCB4';
      ctx.fillRect(x - 25, y + 65, 18, 55);
      ctx.fillRect(x + 7, y + 65, 18, 55);

      ctx.restore();
    }

    function drawShaker(ctx, x, y, scale, progress) {
      ctx.save();
      ctx.scale(scale, scale);

      // Bottle body
      ctx.fillStyle = '#ff1493';
      ctx.fillRect(x / scale - 25, y / scale, 50, 100);

      // Lid
      ctx.fillStyle = '#FFD700';
      ctx.fillRect(x / scale - 30, y / scale - 15, 60, 15);

      // Liquid inside
      ctx.fillStyle = `rgba(255, 105, 180, ${0.5 + progress * 0.5})`;
      ctx.fillRect(x / scale - 22, y / scale + 10, 44, 50);

      // Sparkles on bottle
      ctx.fillStyle = COLORS.paleGold;
      ctx.beginPath();
      ctx.arc((x + 15) / scale, (y + 30) / scale, 8, 0, Math.PI * 2);
      ctx.fill();

      // "GAINS" text
      ctx.font = 'bold 20px Arial';
      ctx.fillStyle = '#FFD700';
      ctx.textAlign = 'center';
      ctx.fillText('GAINS', x / scale, y / scale + 60);

      ctx.restore();
    }

    function drawGridBackground(ctx, intensity) {
      ctx.fillStyle = `rgba(255, 105, 180, ${0.3 * intensity})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = `rgba(255, 215, 0, ${0.5 * intensity})`;
      ctx.lineWidth = 2;

      const gridSize = 50;
      for (let x = 0; x < canvas.width; x += gridSize) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y < canvas.height; y += gridSize) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }
    }

    function drawAura(ctx, x, y, radius, intensity, color) {
      const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
      gradient.addColorStop(0, `rgba(255, 215, 0, ${0.6 * intensity})`);
      gradient.addColorStop(0.5, `rgba(255, 105, 180, ${0.3 * intensity})`);
      gradient.addColorStop(1, 'rgba(255, 105, 180, 0)');

      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawPearlDoor(ctx, x, y, openProgress) {
      const doorWidth = 150;
      const doorHeight = 300;

      // Door panel
      ctx.fillStyle = `rgba(255, 255, 255, ${0.8 + openProgress * 0.2})`;
      ctx.shadowColor = 'rgba(255, 215, 0, 0.8)';
      ctx.shadowBlur = 30;
      ctx.fillRect(x - doorWidth / 2, y - doorHeight / 2, doorWidth, doorHeight);
      ctx.shadowBlur = 0;

      // Gold "B" logo
      ctx.font = 'bold 80px Arial';
      ctx.fillStyle = COLORS.paleGold;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('B', x, y);

      // Door handle (gold)
      ctx.fillStyle = COLORS.paleGold;
      ctx.beginPath();
      ctx.arc(x + doorWidth / 2 - 30, y, 15, 0, Math.PI * 2);
      ctx.fill();

      // Door opening animation
      if (openProgress > 0) {
        ctx.save();
        ctx.globalAlpha = 0.3;
        ctx.translate(x + doorWidth / 2, y);
        ctx.rotate(openProgress * Math.PI / 3);
        ctx.fillStyle = COLORS.barbiePink;
        ctx.fillRect(0, -doorHeight / 2, doorWidth, doorHeight);
        ctx.restore();
      }
    }

    function drawLightRays(ctx, intensity) {
      ctx.save();
      ctx.globalAlpha = 0.3 * intensity;

      for (let i = 0; i < 12; i++) {
        const angle = (i / 12) * Math.PI * 2;
        const gradient = ctx.createLinearGradient(
          canvas.width / 2, canvas.height / 2,
          canvas.width / 2 + Math.cos(angle) * canvas.width,
          canvas.height / 2 + Math.sin(angle) * canvas.height
        );
        gradient.addColorStop(0, 'rgba(255, 255, 255, 0.5)');
        gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');

        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.moveTo(canvas.width / 2, canvas.height / 2);
        ctx.lineTo(
          canvas.width / 2 + Math.cos(angle) * canvas.width,
          canvas.height / 2 + Math.sin(angle) * canvas.height
        );
        ctx.lineTo(
          canvas.width / 2 + Math.cos(angle + 0.1) * canvas.width,
          canvas.height / 2 + Math.sin(angle + 0.1) * canvas.height
        );
        ctx.fill();
      }

      ctx.restore();
    }

    function drawPortalClouds(ctx, intensity) {
      ctx.save();
      ctx.globalAlpha = 0.4 * intensity;
      ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';

      // Cloud-like UI elements
      for (let i = 0; i < 5; i++) {
        const x = canvas.width / 2 + (i - 2) * 100;
        const y = canvas.height / 2 + Math.sin(i) * 50;
        ctx.beginPath();
        ctx.arc(x, y, 40, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    // ==================== ANIMATION LOOP ====================
    function animate(timestamp) {
      if (!animationState.frameStartTime) {
        animationState.frameStartTime = timestamp;
      }

      const frameProgress = (timestamp - animationState.frameStartTime) / FRAMES[animationState.currentFrame].duration;
      const clampedProgress = Math.min(frameProgress, 1);

      // Clear canvas
      ctx.fillStyle = COLORS.barbiePink;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw current frame
      switch (animationState.currentFrame) {
        case 1:
          drawFrame1(ctx, clampedProgress);
          break;
        case 2:
          drawFrame2(ctx, clampedProgress);
          break;
        case 3:
          drawFrame3(ctx, clampedProgress);
          break;
        case 4:
          drawFrame4(ctx, clampedProgress);
          break;
        case 5:
          drawFrame5(ctx, clampedProgress);
          break;
        case 6:
          drawFrame6(ctx, clampedProgress);
          showNarrator(clampedProgress);
          break;
      }

      // Frame transition
      if (frameProgress >= 1 && animationState.currentFrame < 6) {
        animationState.currentFrame++;
        animationState.frameStartTime = timestamp;
        playFrameSound(animationState.currentFrame);
      }

      if (animationState.isAnimating) {
        requestAnimationFrame(animate);
      }
    }

    // ==================== NARRATOR ====================
    function showNarrator(progress) {
      if (progress > 0.2) {
        const narratorBox = document.getElementById('narratorBox');
        const narratorText = document.getElementById('narratorText');
        
        if (!narratorBox.classList.contains('show')) {
          narratorBox.classList.add('show');
        }

        narratorText.textContent = '"Welcome, Player One! You have consumed the\\nElixir of Gains and unlocked the legendary\\nPortal of Content! I am your Guide, Fit-Barbie,\\nand you have just entered... THE GAIN-FRAME!\\nStep through, define your stats, and explore\\nthe ultimate interface. Your quest for\\nknowledge (and quads) begins... NOW!"';
      }
    }

    // ==================== AUDIO ====================
    function playFrameSound(frame) {
      // Using Web Audio API to generate simple sound effects
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();

      switch (frame) {
        case 2:
          // Chugging sound
          playChuggingSound(audioContext);
          break;
        case 3:
          // Power-up sound
          playPowerUpSound(audioContext);
          break;
        case 4:
          // Door creaking
          playDoorSound(audioContext);
          break;
        case 5:
          // Choir sound
          playChoirSound(audioContext);
          break;
      }
    }

    function playChuggingSound(audioContext) {
      const now = audioContext.currentTime;
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      osc.connect(gain);
      gain.connect(audioContext.destination);

      osc.frequency.setValueAtTime(100, now);
      osc.frequency.exponentialRampToValueAtTime(50, now + 0.5);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
      osc.start(now);
      osc.stop(now + 0.5);
    }

    function playPowerUpSound(audioContext) {
      const now = audioContext.currentTime;
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      osc.connect(gain);
      gain.connect(audioContext.destination);

      osc.frequency.setValueAtTime(200, now);
      osc.frequency.exponentialRampToValueAtTime(1000, now + 0.8);
      gain.gain.setValueAtTime(0.5, now);
      gain.gain.exponentialRampToValueAtTime(0, now + 0.8);
      osc.start(now);
      osc.stop(now + 0.8);
    }

    function playDoorSound(audioContext) {
      const now = audioContext.currentTime;
      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();
      osc.connect(gain);
      gain.connect(audioContext.destination);

      osc.frequency.setValueAtTime(150, now);
      osc.frequency.linearRampToValueAtTime(100, now + 1);
      gain.gain.setValueAtTime(0.4, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 1);
      osc.start(now);
      osc.stop(now + 1);
    }

    function playChoirSound(audioContext) {
      const now = audioContext.currentTime;
      const frequencies = [262, 330, 392, 523];

      frequencies.forEach((freq, index) => {
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.connect(gain);
        gain.connect(audioContext.destination);

        osc.frequency.setValueAtTime(freq, now);
        osc.type = 'sine';
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.1, now + 0.2);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 2);
        osc.start(now + index * 0.1);
        osc.stop(now + 2);
      });
    }

    // ==================== CONTROLS ====================
    function startAnimation() {
      if (!animationState.hasStarted) {
        animationState.hasStarted = true;
        animationState.isAnimating = true;
        document.getElementById('clickStart').classList.add('hidden');
        playFrameSound(1);
        requestAnimationFrame(animate);
      }
    }

    function skipToEnd() {
      animationState.isAnimating = false;
      animationState.currentFrame = 6;
      animationState.frameStartTime = 0;
      document.getElementById('clickStart').classList.add('hidden');
      const narratorBox = document.getElementById('narratorBox');
      narratorBox.classList.add('show');
      showNarrator(1);
      animate(0);
    }

    // Start on click
    document.addEventListener('click', startAnimation);
    
    // Also allow keyboard to start
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        startAnimation();
        e.preventDefault();
      }
    });
  </script>
</body>
</html>
